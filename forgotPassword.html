<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="./css/forgotPassword.css">
</head>

<body>

    <div class="forgotPassword-form">
        <div class="container">
            <div class="title">
                <i class="fa-brands fa-spotify"></i>
                <h1 class="name">Spotify</h1>
            </div>
            <div class="main">
                <div class="content">
                    <h2>Reset Password</h2>
                    <form action="login.html" method="get">
                        <input type="email" name="" placeholder="Email" id="email" required>
                        <input type="password" name="" placeholder="New Password" id="password" required>
                        <input type="password" name="" placeholder="Confirm Password" id="confirmPassword" required>
                        <button class="btn" type="submit">Reset Password</button>
                    </form>
                    <p class="account"><a href="./login.html">Back To Login Page</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/forgotPassword.js"></script>

</body>

</html>
