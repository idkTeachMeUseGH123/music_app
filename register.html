<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="./css/register.css">
</head>

<body>
    <div class="register-form">
        <div class="container">
            <div class="title">
                <i class="fa-brands fa-spotify"></i>
                <h1 class="name">Spotify</h1>
            </div>
            <div class="main">
                <div class="content">
                    <h2>Register</h2>
                    <form action="#">
                        <input type="text" name="" placeholder="Username" id="username" required>
                        <input type="email" name="" placeholder="Email" id="email" required>
                        <input type="password" name="" placeholder="Password" id="password" required>
                        <button class="btn" type="submit">Register</button>
                    </form>
                    <p class="account">Already Have An Account? <a href="./login.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/register.js"></script>
</body>

</html>
